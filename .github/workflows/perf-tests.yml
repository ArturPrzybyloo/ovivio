name: Performance tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Load scenario to run (load, spike, stress, endurance)'
        type: choice
        default: load
        options:
          - load
          - spike
          - stress
          - endurance

jobs:
  perf-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build k6 bundle
        run: npm run perf:build

      - name: Run k6 performance test
        env:
          SCENARIO: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || 'load' }}
        run: k6 run perf-tests/dist/dummyjson-auth-me.js

