name: Performance tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Load scenario to run (load, spike, stress, endurance)'
        type: choice
        default: load
        options:
          - load
          - spike
          - stress
          - endurance

jobs:
  perf-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build k6 bundle
        run: npm run perf:build

      - name: Run k6 performance test
        env:
          SCENARIO: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || 'load' }}
        run: k6 run perf-tests/dist/dummyjson-auth-me.js --summary-export perf-tests/summary.json

      - name: Publish k6 summary to job summary
        if: always()
        run: |
          echo '### k6 summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          node -e "const s=require('./perf-tests/summary.json'); \
            const m=s.metrics; \
            const scenario = process.env.SCENARIO || 'load'; \
            const dur = m.http_req_duration || {}; \
            const get = (keys) => { for (const k of keys) { const v = dur[k]; if (typeof v === 'number') return v; } return undefined; }; \
            const p50 = get(['p(50)','med','50']); \
            const p95 = get(['p(95)','95']); \
            const p99 = get(['p(99)','99']); \
            const rate = m.http_req_failed && typeof m.http_req_failed.rate === 'number' ? m.http_req_failed.rate : undefined; \
            const fmtMs = (v) => (typeof v === 'number' ? v.toFixed(0) + ' ms' : 'n/a'); \
            const fmtRate = (v) => (typeof v === 'number' ? v.toFixed(4) : 'n/a'); \
            console.log( \
              'Scenario:', scenario, '\\n', \
              '- http_req_duration P50:', fmtMs(p50), '\\n', \
              '- http_req_duration P95:', fmtMs(p95), '\\n', \
              '- http_req_duration P99:', fmtMs(p99), '\\n', \
              '- Error rate (http_req_failed):', fmtRate(rate) \
            );" >> $GITHUB_STEP_SUMMARY

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: perf-tests/summary.json

