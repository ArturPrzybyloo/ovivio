name: Performance tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Load scenario to run (load, spike, stress, endurance)'
        type: choice
        default: load
        options:
          - load
          - spike
          - stress
          - endurance

jobs:
  perf-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
      LOCKED_OUT_PASSWORD: ${{ secrets.LOCKED_OUT_PASSWORD }}
      DUMMYJSON_USERNAME: ${{ secrets.DUMMYJSON_USERNAME }}
      DUMMYJSON_PASSWORD: ${{ secrets.DUMMYJSON_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build k6 bundle
        run: npm run perf:build

      - name: Run k6 performance test
        env:
          SCENARIO: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || 'load' }}
        run: k6 run perf-tests/dist/dummyjson-auth-me.js --summary-export perf-tests/summary.json

      - name: Publish k6 summary to job summary
        if: always()
        run: |
          echo '### k6 summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          node -e "const s=require('./perf-tests/summary.json'); \
            const m=s.metrics; \
            const scenario = process.env.SCENARIO || 'load'; \
            const dur = m.http_req_duration || {}; \
            const thr = dur.thresholds || {}; \
            const p95 = thr['p(95)<800'] ? thr['p(95)<800'].actual : undefined; \
            const p99 = thr['p(99)<1500'] ? thr['p(99)<1500'].actual : undefined; \
            const fail = m.http_req_failed || {}; \
            const failRate = fail.values && typeof fail.values.rate === 'number' ? fail.values.rate : undefined; \
            const fmtMs = (v) => (typeof v === 'number' ? v.toFixed(2) + ' ms' : 'n/a'); \
            const fmtPct = (v) => (typeof v === 'number' ? (v * 100).toFixed(2) + '%' : 'n/a'); \
            console.log( \
              'Scenario:', scenario, '\\n', \
              '- http_req_duration P95 (threshold):', fmtMs(p95), '\\n', \
              '- http_req_duration P99 (threshold):', fmtMs(p99), '\\n', \
              '- Error rate (http_req_failed):', fmtPct(failRate) \
            );" >> $GITHUB_STEP_SUMMARY

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: perf-tests/summary.json

