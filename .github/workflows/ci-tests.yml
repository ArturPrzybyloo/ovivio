name: UI tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_chromium:
        description: 'Run Chromium project'
        type: boolean
        default: true
      run_firefox:
        description: 'Run Firefox project'
        type: boolean
        default: false
      run_webkit:
        description: 'Run WebKit project'
        type: boolean
        default: false
      run_chromium_mobile:
        description: 'Run Chromium mobile project'
        type: boolean
        default: false
      run_webkit_mobile:
        description: 'Run WebKit mobile project'
        type: boolean
        default: false

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, chromium-mobile, webkit-mobile]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests for project
        if: >
          (matrix.project == 'chromium' && (github.event_name != 'workflow_dispatch' || inputs.run_chromium == 'true')) ||
          (matrix.project == 'firefox' && github.event_name == 'workflow_dispatch' && inputs.run_firefox == 'true') ||
          (matrix.project == 'webkit' && github.event_name == 'workflow_dispatch' && inputs.run_webkit == 'true') ||
          (matrix.project == 'chromium-mobile' && github.event_name == 'workflow_dispatch' && inputs.run_chromium_mobile == 'true') ||
          (matrix.project == 'webkit-mobile' && github.event_name == 'workflow_dispatch' && inputs.run_webkit_mobile == 'true')
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always() && matrix.project == 'chromium'
        with:
          name: playwright-report
          path: playwright-report

